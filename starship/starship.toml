format = """
$directory\
$git_status\
$fill\
$time\
$line_break\
$character"""

add_newline = true

[fill]
symbol = ' '

[directory]
style = "bright-white bold"

[time]
disabled = false
format = '[$time]($style) '
time_format = '%a %d.%m %H:%M'
style = 'white'

[character]
success_symbol = "[п“ғ](bright-white)"
error_symbol = "[п“ғ](bright-red)"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = 'yellow'
ahead = '[пҗұ ](green)'
behind = '[пҗі ](red)'
diverged = '[п‘ғ ](red)'
modified = 'п‘ҷ '
renamed = 'п‘ҡ '
deleted = 'п‘ҳ '
untracked = 'п‘— '
staged = 'п‘Қ '
